apiVersion: v1
kind: Service
metadata:
  name: {{ include "task-management.mongodbServiceName" . }}
  namespace: {{ include "task-management.namespace" . }}
  labels:
    {{- include "task-management.mongodbLabels" . | nindent 4 }}
spec:
  type: {{ .Values.mongodb.service.type }}
  selector:
    {{- include "task-management.mongodbSelectorLabels" . | nindent 4 }}
  ports:
    - name: mongodb
      port: {{ .Values.mongodb.service.port }}
      targetPort: {{ .Values.mongodb.containerPort }}
      protocol: TCP