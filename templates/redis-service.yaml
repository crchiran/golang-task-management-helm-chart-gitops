apiVersion: v1
kind: Service
metadata:
  name: {{ include "task-management.redisServiceName" . }}
  namespace: {{ include "task-management.namespace" . }}
  labels:
    {{- include "task-management.redisLabels" . | nindent 4 }}
spec:
  type: {{ .Values.redis.service.type }}
  selector:
    {{- include "task-management.redisSelectorLabels" . | nindent 4 }}
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: {{ .Values.redis.containerPort }}
      protocol: TCP